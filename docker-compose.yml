services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    restart: unless-stopped
    environment:
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.4.4
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_HEAP_OPTS: "-Xmx256M -Xms256M"
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://${EC2_PUBLIC_IP:-localhost}:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    image: abhishektribhuvan8/aiops-engine:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: raw-logs
      KAFKA_BATCH_SIZE: 500
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/status')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  kafka-consumer:
    image: abhishektribhuvan8/aiops-engine:latest
    restart: unless-stopped
    command: ["python", "kafka_consumer_ml.py"]
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: raw-logs
      KAFKA_BATCH_SIZE: 500
      KAFKA_CONSUMER_GROUP_ID: aiops-rca-consumer
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: "1"

  kafka-producer:
    image: abhishektribhuvan8/aiops-engine:latest
    restart: unless-stopped
    command: ["python", "kafka_producer.py"]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-consumer:
        condition: service_started
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: raw-logs
      KAFKA_BATCH_SIZE: 500
      PYTHONUNBUFFERED: "1"
    profiles:
      - direct-kafka

  simulator:
    image: abhishektribhuvan8/aiops-engine:latest
    restart: unless-stopped
    command: ["python", "simulate_traffic.py"]
    depends_on:
      api:
        condition: service_healthy
    environment:
      API_URL: http://api:8000/ingest
      PYTHONUNBUFFERED: "1"
    profiles:
      - simulator
